<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login - AuthFlow Authentication System">
  <title>Login - AuthFlow</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <div id="navbar-placeholder"></div>

  <section class="auth-section min-vh-100 d-flex align-items-center">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-5 col-md-8 col-sm-10">
          <div class="auth-card card border-0" data-aos="fade-up">
            <div class="card-body p-4 p-md-5">
              <div class="text-center mb-4">
                <div class="auth-icon mb-3">
                  <i class="bi bi-shield-lock fs-1"></i>
                </div>
                <h3 class="fw-bold">Welcome Back</h3>
                <p style="color: var(--text-secondary);">Sign in to continue to AuthFlow</p>
              </div>

              <div id="loginAlert" class="alert d-none"></div>

              <form id="loginForm" novalidate>
                <div class="mb-3">
                  <label for="loginEmail" class="form-label">Email Address</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" required autofocus>
                  </div>
                  <div class="invalid-feedback" id="emailError">Please enter a valid email address.</div>
                </div>

                <div class="mb-3">
                  <label for="loginPassword" class="form-label">Password</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password" required minlength="6">
                    <button class="btn btn-outline-secondary toggle-password" type="button">
                      <i class="bi bi-eye-slash"></i>
                    </button>
                  </div>
                  <div class="invalid-feedback" id="passwordError">Password must be at least 6 characters.</div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label" for="rememberMe" style="color: var(--text-secondary);">Remember me</label>
                  </div>
                  <a href="#" class="small" style="color: var(--primary); text-decoration: none;" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3 position-relative overflow-hidden" id="loginBtn">
                  <span class="btn-text"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</span>
                  <span class="btn-loading d-none">
                    <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                    Signing in...
                  </span>
                </button>
              </form>

              <div class="text-center mt-4">
                <p class="mb-0" style="color: var(--text-secondary);">Don't have an account? <a href="register.html" style="color: var(--primary); font-weight: 600;">Sign Up</a></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0">
        <div class="modal-header border-0">
          <h5 class="modal-title fw-bold"><i class="bi bi-key me-2" style="color: var(--primary);"></i>Reset Password</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p class="small" style="color: var(--text-secondary);">Enter your email address and we'll send you a link to reset your password.</p>
          <div class="mb-3">
            <label for="resetEmail" class="form-label">Email Address</label>
            <input type="email" class="form-control" id="resetEmail" placeholder="name@example.com">
            <div class="invalid-feedback">Please enter a valid email.</div>
          </div>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary px-4" id="resetBtn">Send Reset Link</button>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

  <div class="back-to-top" id="backToTop">
    <i class="bi bi-arrow-up"></i>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/ajax.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
